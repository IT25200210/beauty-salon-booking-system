<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Appointment Detail | Lumiere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background:#141414; color:#e0e0e0; font-family:'Segoe UI',sans-serif; }
        .card { background:#1e1e1e; border:1px solid #333; border-radius:16px; }
        .detail-label { font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; color:#777; }
        .detail-value { font-size:1rem; color:#e8e8e8; font-weight:500; margin-top:4px; }
        .info-box { background:#252525; border:1px solid rgba(201,168,76,0.3);
                    border-radius:8px; padding:1rem; margin-top:1rem; }
        .btn-gold { background:linear-gradient(135deg,#C9A84C,#e8c96a);
                   color:#1a1a1a; font-weight:600; border:none; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width:620px;">
    <div class="mb-4">
        <a th:href="@{/appointments}" class="text-decoration-none" style="color:#C9A84C;">
            &larr; Back to Appointments
        </a>
    </div>
    <div class="card">
        <div class="card-body p-4">
            <h2 class="fw-bold mb-4">Appointment Details</h2>
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="detail-label">Customer</div>
                    <div class="detail-value" th:text="${appointment.customerName}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Service</div>
                    <div class="detail-value" th:text="${appointment.serviceName}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Staff</div>
                    <div class="detail-value" th:text="${appointment.staffName}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Status</div>
                    <div class="detail-value" th:text="${appointment.status}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Date</div>
                    <div class="detail-value" th:text="${appointment.appointmentDate}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Time</div>
                    <div class="detail-value" th:text="${appointment.appointmentTime}"></div>
                </div>
                <div class="col-12">
                    <div class="detail-label">Notes</div>
                    <div class="detail-value" th:text="${appointment.notes != null ? appointment.notes : 'None'}"></div>
                </div>
            </div>
            <!-- Polymorphism Output -->
            <div class="info-box">
                <div style="font-size:0.7rem;letter-spacing:2px;color:#C9A84C;text-transform:uppercase;">
                    Appointment Info (Polymorphism)
                </div>
                <div style="margin-top:6px;" th:text="${info}"></div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <a th:href="@{/appointments/edit/{id}(id=${appointment.id})}"
                   class="btn btn-gold"><i class="bi bi-pencil me-1"></i>Edit</a>
                <a th:href="@{/appointments/delete/{id}(id=${appointment.id})}"
                   class="btn btn-outline-danger"
                   onclick="return confirm('Delete this appointment?')">
                    <i class="bi bi-trash me-1"></i>Delete
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
