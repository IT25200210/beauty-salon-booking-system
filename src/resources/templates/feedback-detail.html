<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Feedback Detail | Lumiere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background:#141414; color:#e0e0e0; font-family:'Segoe UI',sans-serif; }
        .card { background:#1e1e1e; border:1px solid #333; border-radius:16px; }
        .detail-label { font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; color:#777; }
        .detail-value { font-size:1rem; color:#e8e8e8; font-weight:500; margin-top:4px; }
        .stars { color:#C9A84C; font-size:1.3rem; }
        .info-box { background:#252525; border:1px solid rgba(201,168,76,0.3);
            border-radius:8px; padding:1rem; margin-top:1rem; }
        .btn-gold { background:linear-gradient(135deg,#C9A84C,#e8c96a);
            color:#1a1a1a; font-weight:600; border:none; }
        .comment-box { background:#252525; border:1px solid #333; border-radius:8px;
            padding:1rem; font-style:italic; color:#ccc; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width:600px;">
    <a th:href="@{/feedback}" class="text-decoration-none mb-4 d-block" style="color:#C9A84C;">
        &larr; Back to Feedback
    </a>
    <div class="card">
        <div class="card-body p-4">
            <h2 class="fw-bold mb-4">Feedback Details</h2>
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="detail-label">Customer</div>
                    <div class="detail-value" th:text="${feedback.customerName}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Service</div>
                    <div class="detail-value" th:text="${feedback.serviceName}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Rating</div>
                    <div class="stars">
                        <span th:each="i : ${#numbers.sequence(1, feedback.rating)}">&#9733;</span>
                        <span th:each="i : ${#numbers.sequence(feedback.rating + 1, 5)}",
                              style="color:#444;">&#9733;</span>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Date</div>
                    <div class="detail-value" th:text="${feedback.feedbackDate}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Status</div>
                    <div class="detail-value" th:text="${feedback.status}"></div>
                </div>
                <div class="col-12">
                    <div class="detail-label">Comment</div>
                    <div class="comment-box" th:text="${feedback.comment}"></div>
                </div>
            </div>
            <div class="info-box">
                <div style="font-size:0.7rem;letter-spacing:2px;color:#C9A84C;text-transform:uppercase;">
                    Feedback Info (Polymorphism)
                </div>
                <div style="margin-top:6px;" th:text="${info}"></div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <a th:href="@{/feedback/edit/{id}(id=${feedback.id})}"
                   class="btn btn-gold">Edit</a>
                <a th:href="@{/feedback/delete/{id}(id=${feedback.id})}"
                   class="btn btn-outline-danger"
                   onclick="return confirm('Delete this feedback?')">Delete</a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
