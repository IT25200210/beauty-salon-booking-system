<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lumière Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #e8c96a;
            --dark: #141414;
        }
        body {
            background: var(--dark);
            color: #e0e0e0;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(ellipse at 50% 50%, rgba(201,168,76,0.07) 0%, transparent 70%);
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        .tagline {
            font-size: 0.75rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 3rem;
        }
        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 1.5rem auto;
        }
        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border: none;
            color: #1a1a1a;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-gold:hover { opacity: 0.9; transform: translateY(-2px); color: #1a1a1a; }
        .btn-outline {
            background: transparent;
            border: 1px solid #333;
            color: #aaa;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
        .features {
            display: flex;
            gap: 2rem;
            margin-top: 4rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .feature-item {
            text-align: center;
            color: #555;
            font-size: 0.78rem;
            letter-spacing: 1px;
        }
        .feature-item i {
            font-size: 1.4rem;
            color: var(--gold);
            display: block;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

<div class="logo">Lumière</div>
<div class="tagline">Salon &amp; Wellness · Colombo</div>
<div class="divider"></div>

<p style="color: #666; font-size: 0.9rem; margin-bottom: 2rem; text-align:center; max-width: 400px;">
    Experience premium grooming and wellness services tailored for everyone.
</p>

<div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
    <a th:href="@{/users/login}" class="btn-gold">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
    </a>
    <a th:href="@{/users/register}" class="btn-outline">
        <i class="bi bi-person-plus"></i> Register
    </a>
</div>

<div class="features">
    <div class="feature-item">
        <i class="bi bi-scissors"></i>
        Hair &amp; Styling
    </div>
    <div class="feature-item">
        <i class="bi bi-calendar-check"></i>
        Easy Booking
    </div>
    <div class="feature-item">
        <i class="bi bi-stars"></i>
        Premium Care
    </div>
    <div class="feature-item">
        <i class="bi bi-person-check"></i>
        Expert Staff
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
