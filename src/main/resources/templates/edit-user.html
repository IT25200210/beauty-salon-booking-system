<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit User | Lumière Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #e8c96a;
            --dark: #141414;
            --charcoal: #2c2c2c;
            --surface: #1e1e1e;
            --surface2: #252525;
            --text-muted: #777;
            --border: #333;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--dark);
            color: #e0e0e0;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        /* Sidebar (same as user-list) */
        .sidebar {
            width: 240px;
            min-height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            position: fixed;
            top: 0; left: 0;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .sidebar-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }

        .sidebar-sub {
            font-size: 0.62rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        .nav-label {
            font-size: 0.62rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            margin-top: 1rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.55rem 0.75rem;
            border-radius: 8px;
            color: #aaa;
            text-decoration: none;
            font-size: 0.87rem;
            transition: background 0.15s, color 0.15s;
            margin-bottom: 0.2rem;
        }

        .nav-item:hover { background: var(--charcoal); color: #e0e0e0; }
        .nav-item.active { background: rgba(201,168,76,0.12); color: var(--gold); }
        .nav-item i { font-size: 1rem; }

        /* Main content */
        .main-content {
            margin-left: 240px;
            padding: 2.5rem 2.5rem;
            max-width: calc(100vw - 240px);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
        }

        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 600;
            color: #fff;
        }

        .page-breadcrumb {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .btn-back {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: #aaa;
            font-size: 0.78rem;
            padding: 0.55rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: border-color 0.15s, color 0.15s;
        }

        .btn-back:hover { border-color: #555; color: #ddd; }

        /* Form card */
        .form-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            max-width: 680px;
        }

        .form-card-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar-lg {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2a2215, #3a3020);
            border: 2px solid rgba(201,168,76,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--gold);
        }

        .form-card-title {
            font-weight: 500;
            color: #e8e8e8;
            font-size: 0.95rem;
        }

        .form-card-id {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .form-body {
            padding: 2rem;
        }

        .form-label {
            font-size: 0.72rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .form-control, .form-select {
            background: var(--charcoal);
            border: 1px solid var(--border);
            color: #e8e8e8;
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus, .form-select:focus {
            background: var(--charcoal);
            border-color: var(--gold);
            color: #fff;
            box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
        }

        .form-control::placeholder { color: #555; }
        .form-select option { background: var(--charcoal); }

        .input-icon { position: relative; }
        .input-icon i {
            position: absolute;
            right: 12px; top: 50%;
            transform: translateY(-50%);
            color: #555;
            font-size: 0.9rem;
            pointer-events: none;
        }
        .input-icon .form-control { padding-right: 2.2rem; }

        .form-divider {
            height: 1px;
            background: var(--border);
            margin: 1.5rem 0;
        }

        .section-label {
            font-size: 0.68rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .form-actions {
            display: flex;
            gap: 0.75rem;
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }

        .btn-save {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border: none;
            color: #1a1a1a;
            font-weight: 600;
            font-size: 0.82rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 0.65rem 1.75rem;
            border-radius: 8px;
            transition: opacity 0.2s, transform 0.15s;
        }

        .btn-save:hover { opacity: 0.9; transform: translateY(-1px); }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border);
            color: #aaa;
            font-size: 0.82rem;
            padding: 0.65rem 1.4rem;
            border-radius: 8px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: border-color 0.15s;
        }

        .btn-cancel:hover { border-color: #555; color: #ddd; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 1.5rem 1rem; max-width: 100vw; }
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
    <div>
        <div class="sidebar-logo">Lumière</div>
        <div class="sidebar-sub">Admin Panel</div>

        <div class="nav-label">Management</div>
        <a href="/users" class="nav-item active">
            <i class="bi bi-people"></i> Users
        </a>
        <a href="#" class="nav-item">
            <i class="bi bi-calendar3"></i> Appointments
        </a>
        <a href="#" class="nav-item">
            <i class="bi bi-scissors"></i> Services
        </a>
        <a href="#" class="nav-item">
            <i class="bi bi-star"></i> Reviews
        </a>

        <div class="nav-label" style="margin-top:2rem;">Account</div>
        <a href="/users/login" class="nav-item">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </div>
</nav>

<!-- Main Content -->
<div class="main-content">

    <div class="page-header">
        <div>
            <div class="page-title">Edit User</div>
            <div class="page-breadcrumb">Admin &rsaquo; Users &rsaquo; Edit</div>
        </div>
        <a th:href="@{/users}" class="btn-back">
            <i class="bi bi-arrow-left"></i> Back to Users
        </a>
    </div>

    <div class="form-card">

        <!-- Card header with avatar -->
        <div class="form-card-header">
            <div class="user-avatar-lg" th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}">J</div>
            <div>
                <div class="form-card-title" th:text="${user.username}">Username</div>
                <div class="form-card-id">User ID: <span th:text="${user.id}">1</span></div>
            </div>
        </div>

        <!-- Form -->
        <form th:action="@{/users/edit/{id}(id=${user.id})}" th:object="${user}" method="post">

            <div class="form-body">

                <div class="section-label">Account Information</div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Username</label>
                        <div class="input-icon">
                            <input type="text" class="form-control" th:field="*{username}" required/>
                            <i class="bi bi-person"></i>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Role</label>
                        <select class="form-select" th:field="*{role}">
                            <option value="CUSTOMER">Customer</option>
                            <option value="ADMIN">Admin</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Email Address</label>
                        <div class="input-icon">
                            <input type="email" class="form-control" th:field="*{email}" required/>
                            <i class="bi bi-envelope"></i>
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Phone Number</label>
                        <div class="input-icon">
                            <input type="tel" class="form-control" th:field="*{phone}" placeholder="07X XXX XXXX"/>
                            <i class="bi bi-phone"></i>
                        </div>
                    </div>
                </div>

                <div class="form-divider"></div>

                <div class="section-label">Change Password</div>

                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">New Password <span style="color:var(--text-muted); font-size:0.65rem;">(leave blank to keep current)</span></label>
                        <div class="input-icon">
                            <input type="password" class="form-control" th:field="*{password}" placeholder="Enter new password"/>
                            <i class="bi bi-lock"></i>
                        </div>
                    </div>
                </div>

            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-save">
                    <i class="bi bi-check2 me-1"></i>Save Changes
                </button>
                <a th:href="@{/users}" class="btn-cancel">Cancel</a>
            </div>

        </form>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
