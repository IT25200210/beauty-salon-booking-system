<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Payment Detail | Lumiere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background:#141414; color:#e0e0e0; font-family:'Segoe UI',sans-serif; }
        .card { background:#1e1e1e; border:1px solid #333; border-radius:16px; }
        .detail-label { font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; color:#777; }
        .detail-value { font-size:1rem; color:#e8e8e8; font-weight:500; margin-top:4px; }
        .info-box { background:#252525; border:1px solid rgba(201,168,76,0.3); border-radius:8px; padding:1rem; margin-top:1rem; }
        .btn-gold { background:linear-gradient(135deg,#C9A84C,#e8c96a); color:#1a1a1a; font-weight:600; border:none; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width:600px;">
    <a th:href="@{/payments}" class="text-decoration-none mb-4 d-block" style="color:#C9A84C;">
        &larr; Back to Payments
    </a>
    <div class="card">
        <div class="card-body p-4">
            <h2 class="fw-bold mb-4">Payment Details</h2>
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="detail-label">Customer</div>
                    <div class="detail-value" th:text="${payment.customerName}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Service</div>
                    <div class="detail-value" th:text="${payment.serviceName}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Amount</div>
                    <div class="detail-value" th:text="'Rs. ' + ${payment.amount}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Method</div>
                    <div class="detail-value" th:text="${payment.paymentMethod}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Date</div>
                    <div class="detail-value" th:text="${payment.paymentDate}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Status</div>
                    <div class="detail-value" th:text="${payment.status}"></div>
                </div>
                <div class="col-12">
                    <div class="detail-label">Notes</div>
                    <div class="detail-value" th:text="${payment.notes != null ? payment.notes : 'None'}"></div>
                </div>
            </div>
            <div class="info-box">
                <div style="font-size:0.7rem;letter-spacing:2px;color:#C9A84C;text-transform:uppercase;">
                    Payment Info
                </div>
                <div style="margin-top:6px;" th:text="${info}"></div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <a th:href="@{/payments/edit/{id}(id=${payment.id})}" class="btn btn-gold">Edit</a>
                <a th:href="@{/payments/delete/{id}(id=${payment.id})}" class="btn btn-outline-danger"
                   onclick="return confirm('Delete this payment?')">Delete</a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
