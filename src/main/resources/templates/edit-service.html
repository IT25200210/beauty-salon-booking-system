</html><!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Edit Service | Lumiere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background:#141414; color:#e0e0e0; font-family:'Segoe UI',sans-serif; }
        .card { background:#1e1e1e; border:1px solid #333; border-radius:16px; }
        .form-label { font-size:0.72rem; letter-spacing:2px; text-transform:uppercase; color:#888; }
        .form-control,.form-select { background:#2c2c2c; border:1px solid #444;
          color:#e0e0e0; border-radius:8px; }
        .form-control:focus,.form-select:focus { background:#2c2c2c; border-color:#C9A84C;
          color:#fff; box-shadow:0 0 0 3px rgba(201,168,76,0.12); }
        .form-select option { background:#2c2c2c; }
        .btn-gold { background:linear-gradient(135deg,#C9A84C,#e8c96a);
                   color:#1a1a1a; font-weight:600; border:none; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width:600px;">
    <a th:href="@{/services}" class="text-decoration-none mb-4 d-block" style="color:#C9A84C;">
        &larr; Back to Services
    </a>
    <div class="card">
        <div class="card-body p-4">
            <h2 class="fw-bold mb-1">Edit Service</h2>
            <p style="color:#666;font-size:0.85rem;" class="mb-4">
                Service ID: <span style="color:#C9A84C;" th:text="${service.id}"></span>
            </p>
            <form th:action="@{/services/edit/{id}(id=${service.id})}"
                  th:object="${service}" method="post">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Service Name</label>
                        <input type="text" class="form-control" th:field="*{serviceName}" required/>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Category</label>
                        <select class="form-select" th:field="*{category}">
                            <option value="HAIR">Hair</option>
                            <option value="SKIN">Skin</option>
                            <option value="NAIL">Nail</option>
                            <option value="MASSAGE">Massage</option>
                            <option value="OTHER">Other</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Status</label>
                        <select class="form-select" th:field="*{status}">
                            <option value="ACTIVE">ACTIVE</option>
                            <option value="INACTIVE">INACTIVE</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Duration (min)</label>
                        <input type="number" class="form-control" th:field="*{duration}" required/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Price (Rs.)</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{price}" required/>
                    </div>
                    <div class="col-12 mt-2">
                        <button type="submit" class="btn btn-gold w-100 py-2">
                            <i class="bi bi-check2 me-2"></i>Save Changes
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
