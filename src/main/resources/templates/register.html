<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register | Lumière Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #e8c96a;
            --dark: #1a1a1a;
            --charcoal: #2c2c2c;
            --surface: #242424;
            --text-muted: #888;
            --border: #3a3a3a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--dark);
            color: #e8e8e8;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.06) 0%, transparent 60%),
            radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.04) 0%, transparent 50%);
        }

        .page-wrapper {
            display: flex;
            width: 100%;
            max-width: 900px;
            min-height: 580px;
            margin: 2rem auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        }

        /* Left panel */
        .brand-panel {
            width: 38%;
            background: linear-gradient(160deg, #1e1a12 0%, #2a2215 50%, #1a1a1a 100%);
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .brand-panel::before {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 200px; height: 200px;
            border-radius: 50%;
            border: 1px solid rgba(201,168,76,0.15);
        }
        .brand-panel::after {
            content: '';
            position: absolute;
            bottom: 40px; left: -80px;
            width: 250px; height: 250px;
            border-radius: 50%;
            border: 1px solid rgba(201,168,76,0.08);
        }

        .brand-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .brand-tagline {
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .brand-quote {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 300;
            line-height: 1.7;
            color: #c0b090;
            font-style: italic;
        }

        .brand-footer {
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* Right panel / form */
        .form-panel {
            flex: 1;
            background: var(--surface);
            padding: 3rem 3rem;
        }

        .form-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.25rem;
        }

        .form-subtitle {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .form-label {
            font-size: 0.72rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .form-control, .form-select {
            background: var(--charcoal);
            border: 1px solid var(--border);
            color: #e8e8e8;
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus, .form-select:focus {
            background: var(--charcoal);
            border-color: var(--gold);
            color: #fff;
            box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
        }

        .form-control::placeholder { color: #555; }

        .form-select option { background: var(--charcoal); }

        .input-icon {
            position: relative;
        }
        .input-icon i {
            position: absolute;
            right: 12px; top: 50%;
            transform: translateY(-50%);
            color: #555;
            font-size: 0.9rem;
            pointer-events: none;
        }
        .input-icon .form-control { padding-right: 2.2rem; }

        .btn-register {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border: none;
            color: #1a1a1a;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            width: 100%;
            transition: opacity 0.2s, transform 0.15s;
        }

        .btn-register:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.25rem 0;
            color: var(--text-muted);
            font-size: 0.75rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .login-link {
            text-align: center;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .login-link a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover { text-decoration: underline; }

        @media (max-width: 700px) {
            .brand-panel { display: none; }
            .form-panel { padding: 2rem 1.5rem; }
            .page-wrapper { margin: 1rem; border-radius: 12px; }
        }
    </style>
</head>
<body>
<div class="page-wrapper">

    <!-- Left Brand Panel -->
    <div class="brand-panel">
        <div>
            <div class="brand-logo">Lumière</div>
            <div class="brand-tagline">Salon &amp; Wellness</div>
        </div>
        <div class="brand-quote">
            "Style is a way to say who you are without having to speak."
        </div>
        <div class="brand-footer">EST. 2024 · COLOMBO, SRI LANKA</div>
    </div>

    <!-- Right Form Panel -->
    <div class="form-panel">
        <div class="form-title">Create Account</div>
        <div class="form-subtitle">Join us and start booking your experience</div>

        <form th:action="@{/users/register}" th:object="${user}" method="post">

            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">Username</label>
                    <div class="input-icon">
                        <input type="text" class="form-control" th:field="*{username}" placeholder="e.g. john_doe" required/>
                        <i class="bi bi-person"></i>
                    </div>
                </div>

                <div class="col-12">
                    <label class="form-label">Email Address</label>
                    <div class="input-icon">
                        <input type="email" class="form-control" th:field="*{email}" placeholder="you@example.com" required/>
                        <i class="bi bi-envelope"></i>
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Phone Number</label>
                    <div class="input-icon">
                        <input type="tel" class="form-control" th:field="*{phone}" placeholder="07X XXX XXXX"/>
                        <i class="bi bi-phone"></i>
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Role</label>
                    <select class="form-select" th:field="*{role}">
                        <option value="CUSTOMER">Customer</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label">Password</label>
                    <div class="input-icon">
                        <input type="password" class="form-control" th:field="*{password}" placeholder="Min. 8 characters" required/>
                        <i class="bi bi-lock"></i>
                    </div>
                </div>
            </div>

            <div style="margin-top: 1.75rem;">
                <button type="submit" class="btn btn-register">
                    <i class="bi bi-check2-circle me-2"></i>Create Account
                </button>
            </div>

            <div class="divider">or</div>

            <div class="login-link">
                Already have an account? <a th:href="@{/users/login}">Sign in here</a>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
