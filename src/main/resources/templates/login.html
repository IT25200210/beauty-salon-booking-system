<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | Lumière Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #e8c96a;
            --dark: #1a1a1a;
            --charcoal: #2c2c2c;
            --surface: #242424;
            --text-muted: #888;
            --border: #3a3a3a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--dark);
            color: #e8e8e8;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(ellipse at 80% 50%, rgba(201,168,76,0.06) 0%, transparent 60%),
            radial-gradient(ellipse at 20% 80%, rgba(201,168,76,0.04) 0%, transparent 50%);
        }

        .login-wrapper {
            width: 100%;
            max-width: 460px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.8rem;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .brand-tagline {
            font-size: 0.68rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .login-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 2.5rem 2.5rem;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .form-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.25rem;
        }

        .form-subtitle {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .form-label {
            font-size: 0.72rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .form-control {
            background: var(--charcoal);
            border: 1px solid var(--border);
            color: #e8e8e8;
            border-radius: 8px;
            padding: 0.7rem 0.9rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            background: var(--charcoal);
            border-color: var(--gold);
            color: #fff;
            box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
        }

        .form-control::placeholder { color: #555; }

        .input-icon {
            position: relative;
        }
        .input-icon i {
            position: absolute;
            right: 12px; top: 50%;
            transform: translateY(-50%);
            color: #555;
            font-size: 0.9rem;
            pointer-events: none;
        }
        .input-icon .form-control { padding-right: 2.2rem; }

        .btn-login {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border: none;
            color: #1a1a1a;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            width: 100%;
            transition: opacity 0.2s, transform 0.15s;
        }

        .btn-login:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .alert-error {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #f87171;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.82rem;
            margin-bottom: 1.25rem;
        }

        .register-link {
            text-align: center;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 1.5rem;
        }

        .register-link a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover { text-decoration: underline; }

        .forgot-link {
            font-size: 0.78rem;
            color: var(--text-muted);
            text-decoration: none;
            float: right;
            margin-top: 0.3rem;
        }

        .forgot-link:hover { color: var(--gold); }
    </style>
</head>
<body>
<div class="login-wrapper">

    <div class="brand-header">
        <div class="brand-logo">Lumière</div>
        <div class="brand-tagline">Salon &amp; Wellness</div>
    </div>

    <div class="login-card">
        <div class="form-title">Welcome Back</div>
        <div class="form-subtitle">Sign in to manage your account</div>

        <!-- Error message (shown if login fails) -->
        <div class="alert-error" th:if="${error}">
            <i class="bi bi-exclamation-circle me-2"></i>
            <span th:text="${error}">Invalid username or password.</span>
        </div>

        <form th:action="@{/users/login}" method="post">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-icon">
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required/>
                    <i class="bi bi-person"></i>
                </div>
            </div>

            <div class="mb-1">
                <label class="form-label">Password</label>
                <div class="input-icon">
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required/>
                    <i class="bi bi-lock"></i>
                </div>
            </div>

            <div style="margin-bottom: 1.75rem;">
                <a href="#" class="forgot-link">Forgot password?</a>
                <div style="clear:both;"></div>
            </div>

            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>

        </form>
    </div>

    <div class="register-link">
        Don't have an account? <a th:href="@{/users/register}">Register here</a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
