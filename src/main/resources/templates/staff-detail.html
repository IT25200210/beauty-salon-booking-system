<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Staff Detail | Lumiere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background:#141414; color:#e0e0e0; font-family:'Segoe UI',sans-serif; }
        .card { background:#1e1e1e; border:1px solid #333; border-radius:16px; }
        .detail-label { font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; color:#777; }
        .detail-value { font-size:1rem; color:#e8e8e8; font-weight:500; margin-top:4px; }
        .info-box { background:#252525; border:1px solid rgba(201,168,76,0.3);
                    border-radius:8px; padding:1rem; margin-top:1rem; }
        .btn-gold { background:linear-gradient(135deg,#C9A84C,#e8c96a);
                   color:#1a1a1a; font-weight:600; border:none; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width:600px;">
    <a th:href="@{/staff}" class="text-decoration-none mb-4 d-block" style="color:#C9A84C;">
        &larr; Back to Staff
    </a>
    <div class="card">
        <div class="card-body p-4">
            <h2 class="fw-bold mb-4">Staff Profile</h2>
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="detail-label">Name</div>
                    <div class="detail-value" th:text="${staff.name}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Specialization</div>
                    <div class="detail-value" th:text="${staff.specialization}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Email</div>
                    <div class="detail-value" th:text="${staff.email}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Phone</div>
                    <div class="detail-value" th:text="${staff.phone}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Working Hours</div>
                    <div class="detail-value" th:text="${staff.workingHours}"></div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Status</div>
                    <div class="detail-value" th:text="${staff.status}"></div>
                </div>
            </div>
            <div class="info-box">
                <div style="font-size:0.7rem;letter-spacing:2px;color:#C9A84C;text-transform:uppercase;">
                    Staff Profile (Polymorphism)
                </div>
                <div style="margin-top:6px;" th:text="${info}"></div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <a th:href="@{/staff/edit/{id}(id=${staff.id})}" class="btn btn-gold">Edit</a>
                <a th:href="@{/staff/delete/{id}(id=${staff.id})}" class="btn btn-outline-danger"
                   onclick="return confirm('Delete this staff member?')">Delete</a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
