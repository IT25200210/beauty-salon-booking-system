<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Appointments | Lumiere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background:#141414; color:#e0e0e0; font-family:'Segoe UI',sans-serif; }
        .navbar-brand { font-weight:700; color:#C9A84C !important; font-size:1.4rem; }
        .card { background:#1e1e1e; border:1px solid #333; border-radius:12px; }
        .table { color:#d0d0d0; }
        .table thead th { background:#252525; color:#888; font-size:0.75rem;
                          letter-spacing:2px; text-transform:uppercase; border-color:#333; }
        .table tbody td { border-color:#2a2a2a; vertical-align:middle; }
        .table tbody tr:hover td { background:rgba(255,255,255,0.02); }
        .btn-gold { background:linear-gradient(135deg,#C9A84C,#e8c96a);
                   color:#1a1a1a; font-weight:600; border:none; }
        .btn-gold:hover { opacity:0.9; color:#1a1a1a; }
        .badge-pending { background:rgba(255,193,7,0.15); color:#ffc107;
                         border:1px solid rgba(255,193,7,0.3); border-radius:20px;
                         padding:0.25rem 0.7rem; font-size:0.72rem; }
        .badge-confirmed { background:rgba(40,167,69,0.15); color:#5cb85c;
                           border:1px solid rgba(40,167,69,0.3); border-radius:20px;
                           padding:0.25rem 0.7rem; font-size:0.72rem; }
        .badge-cancelled { background:rgba(220,53,69,0.15); color:#f87171;
                           border:1px solid rgba(220,53,69,0.3); border-radius:20px;
                           padding:0.25rem 0.7rem; font-size:0.72rem; }
        .badge-completed { background:rgba(100,180,255,0.15); color:#7ab8f5;
                           border:1px solid rgba(100,180,255,0.3); border-radius:20px;
                           padding:0.25rem 0.7rem; font-size:0.72rem; }
        .search-input { background:#2c2c2c; border:1px solid #444; color:#e0e0e0;
                        border-radius:8px; padding:0.5rem 1rem; }
        .search-input:focus { border-color:#C9A84C; box-shadow:0 0 0 3px rgba(201,168,76,0.1);
                              background:#2c2c2c; color:#fff; outline:none; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark" style="background:#1e1e1e;border-bottom:1px solid #333;">
    <div class="container">
        <span class="navbar-brand">Lumiere Salon</span>
        <div class="d-flex gap-3">
            <a href="/users" class="nav-link text-secondary">Users</a>
            <a href="/appointments" class="nav-link" style="color:#C9A84C;">Appointments</a>
            <a href="/services" class="nav-link text-secondary">Services</a>
        </div>
    </div>
</nav>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="mb-0 fw-bold">Appointments</h3>
            <small style="color:#777;">Manage all salon appointments</small>
        </div>
        <a th:href="@{/appointments/book}" class="btn btn-gold">
            <i class="bi bi-plus-lg me-1"></i>Book Appointment
        </a>
    </div>
    <!-- Search -->
    <form th:action="@{/appointments/search}" method="get" class="mb-3">
        <div class="d-flex gap-2">
            <input type="text" name="keyword" class="search-input flex-grow-1"
                   th:value="${keyword}" placeholder="Search by customer or service..."/>
            <button type="submit" class="btn btn-gold px-3">
                <i class="bi bi-search"></i>
            </button>
            <a th:href="@{/appointments}" class="btn btn-outline-secondary">Clear</a>
        </div>
    </form>
    <div th:if="${keyword}" class="mb-2" style="color:#777;font-size:0.82rem;">
        Results for: <span style="color:#C9A84C;" th:text="${keyword}"></span>
        &nbsp;|&nbsp; <span th:text="${appointments.size()}"></span> found
    </div>
    <!-- Table -->
    <div class="card">
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead><tr>
                    <th>#</th><th>Customer</th><th>Service</th>
                    <th>Staff</th><th>Date</th><th>Time</th><th>Status</th><th>Actions</th>
                </tr></thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(appointments)}">
                    <td colspan="8" class="text-center py-4" style="color:#555;">
                        No appointments found.
                        <a th:href="@{/appointments/book}" style="color:#C9A84C;">Book one now.</a>
                    </td>
                </tr>
                <tr th:each="apt : ${appointments}">
                    <td style="color:#666;" th:text="${apt.id}"></td>
                    <td th:text="${apt.customerName}"></td>
                    <td th:text="${apt.serviceName}"></td>
                    <td th:text="${apt.staffName != null ? apt.staffName : 'TBD'}"></td>
                    <td th:text="${apt.appointmentDate}"></td>
                    <td th:text="${apt.appointmentTime}"></td>
                    <td>
              <span th:class="${'badge-' + apt.status.toLowerCase()}"
                    th:text="${apt.status}"></span>
                    </td>
                    <td>
                        <div class="d-flex gap-1">
                            <a th:href="@{/appointments/detail/{id}(id=${apt.id})}"
                               class="btn btn-sm" style="background:rgba(100,180,255,0.1);
                   border:1px solid rgba(100,180,255,0.3);color:#7ab8f5;">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/appointments/edit/{id}(id=${apt.id})}"
                               class="btn btn-sm" style="background:rgba(201,168,76,0.1);
                   border:1px solid rgba(201,168,76,0.3);color:#C9A84C;">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/appointments/delete/{id}(id=${apt.id})}"
                               class="btn btn-sm" style="background:rgba(220,53,69,0.1);
                   border:1px solid rgba(220,53,69,0.3);color:#f87171;"
                               onclick="return confirm('Delete this appointment?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
