<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Add Payment | Lumiere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background:#141414; color:#e0e0e0; font-family:'Segoe UI',sans-serif; }
        .card { background:#1e1e1e; border:1px solid #333; border-radius:16px; }
        .form-label { font-size:0.72rem; letter-spacing:2px; text-transform:uppercase; color:#888; }
        .form-control,.form-select { background:#2c2c2c; border:1px solid #444; color:#e0e0e0; border-radius:8px; }
        .form-control:focus,.form-select:focus { background:#2c2c2c; border-color:#C9A84C; color:#fff; box-shadow:0 0 0 3px rgba(201,168,76,0.12); }
        .form-control::placeholder { color:#555; }
        .form-select option { background:#2c2c2c; }
        .btn-gold { background:linear-gradient(135deg,#C9A84C,#e8c96a); color:#1a1a1a; font-weight:600; border:none; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width:600px;">
    <a th:href="@{/payments}" class="text-decoration-none mb-4 d-block" style="color:#C9A84C;">
        &larr; Back to Payments
    </a>
    <div class="card">
        <div class="card-body p-4">
            <h2 class="fw-bold mb-1">Record Payment</h2>
            <p style="color:#666;font-size:0.85rem;" class="mb-4">Enter payment details</p>
            <form th:action="@{/payments/add}" th:object="${payment}" method="post">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Customer Name</label>
                        <input type="text" class="form-control" th:field="*{customerName}" placeholder="Customer full name" required/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Service</label>
                        <input type="text" class="form-control" th:field="*{serviceName}" placeholder="e.g. Haircut"/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Amount (Rs.)</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{amount}" placeholder="e.g. 1500.00" required/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Payment Method</label>
                        <select class="form-select" th:field="*{paymentMethod}">
                            <option value="CASH">Cash</option>
                            <option value="CARD">Card</option>
                            <option value="ONLINE">Online Transfer</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Payment Date</label>
                        <input type="date" class="form-control" th:field="*{paymentDate}" required/>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Notes (Optional)</label>
                        <textarea class="form-control" th:field="*{notes}" rows="2" placeholder="Any notes..."></textarea>
                    </div>
                    <div class="col-12 mt-2">
                        <button type="submit" class="btn btn-gold w-100 py-2">Record Payment</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
