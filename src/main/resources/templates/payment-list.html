<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Payments | Lumiere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background:#141414; color:#e0e0e0; font-family:'Segoe UI',sans-serif; }
        .navbar-brand { font-weight:700; color:#C9A84C !important; }
        .card { background:#1e1e1e; border:1px solid #333; border-radius:12px; }
        .table { color:#d0d0d0; }
        .table thead th { background:#252525; color:#888; font-size:0.75rem; letter-spacing:2px; text-transform:uppercase; border-color:#333; }
        .table tbody td { border-color:#2a2a2a; vertical-align:middle; }
        .btn-gold { background:linear-gradient(135deg,#C9A84C,#e8c96a); color:#1a1a1a; font-weight:600; border:none; }
        .badge-paid { background:rgba(40,167,69,0.15); color:#5cb85c; border:1px solid rgba(40,167,69,0.3); border-radius:20px; padding:0.2rem 0.6rem; font-size:0.72rem; }
        .badge-pending { background:rgba(255,193,7,0.15); color:#ffc107; border:1px solid rgba(255,193,7,0.3); border-radius:20px; padding:0.2rem 0.6rem; font-size:0.72rem; }
        .badge-refunded { background:rgba(100,180,255,0.15); color:#7ab8f5; border:1px solid rgba(100,180,255,0.3); border-radius:20px; padding:0.2rem 0.6rem; font-size:0.72rem; }
        .search-input { background:#2c2c2c; border:1px solid #444; color:#e0e0e0; border-radius:8px; padding:0.5rem 1rem; }
        .search-input:focus { border-color:#C9A84C; outline:none; background:#2c2c2c; color:#fff; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark" style="background:#1e1e1e;border-bottom:1px solid #333;">
    <div class="container">
        <span class="navbar-brand">Lumiere Salon</span>
        <div class="d-flex gap-3">
            <a href="/payments" class="nav-link" style="color:#C9A84C;">Payments</a>
        </div>
    </div>
</nav>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="mb-0 fw-bold">Payment Management</h3>
            <small style="color:#777;">Track all salon payments</small>
        </div>
        <a th:href="@{/payments/add}" class="btn btn-gold">Add Payment</a>
    </div>
    <form th:action="@{/payments/search}" method="get" class="mb-3">
        <div class="d-flex gap-2">
            <input type="text" name="keyword" class="search-input flex-grow-1" th:value="${keyword}" placeholder="Search by customer or service..."/>
            <button type="submit" class="btn btn-gold px-3">Search</button>
            <a th:href="@{/payments}" class="btn btn-outline-secondary">Clear</a>
        </div>
    </form>
    <div class="card">
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead><tr>
                    <th>#</th><th>Customer</th><th>Service</th>
                    <th>Amount (Rs.)</th><th>Method</th><th>Date</th><th>Status</th><th>Actions</th>
                </tr></thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(payments)}">
                    <td colspan="8" class="text-center py-4" style="color:#555;">
                        No payments found. <a th:href="@{/payments/add}" style="color:#C9A84C;">Add one.</a>
                    </td>
                </tr>
                <tr th:each="p : ${payments}">
                    <td style="color:#666;" th:text="${p.id}"></td>
                    <td th:text="${p.customerName}"></td>
                    <td th:text="${p.serviceName}"></td>
                    <td th:text="${p.amount}"></td>
                    <td th:text="${p.paymentMethod}"></td>
                    <td th:text="${p.paymentDate}"></td>
                    <td><span th:class="${'badge-' + (p.status != null ? p.status.toLowerCase() : 'paid')}" th:text="${p.status}"></span></td>
                    <td>
                        <div class="d-flex gap-1">
                            <a th:href="@{/payments/detail/{id}(id=${p.id})}" class="btn btn-sm" style="background:rgba(100,180,255,0.1);color:#7ab8f5;">View</a>
                            <a th:href="@{/payments/edit/{id}(id=${p.id})}" class="btn btn-sm" style="background:rgba(201,168,76,0.1);color:#C9A84C;">Edit</a>
                            <a th:href="@{/payments/delete/{id}(id=${p.id})}" class="btn btn-sm" style="background:rgba(220,53,69,0.1);color:#f87171;" onclick="return confirm('Delete this payment?')">Delete</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
